name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号（如 20240223），留空则自动检测最新版'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect latest webd version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(curl -sS -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/webd90kb/webd/contents/docs/webd/webd_dl" \
              | jq -r '.[].name' \
              | grep -E '^[0-9]{8}$' \
              | sort -rn \
              | head -1)
          fi
          if [ -z "$VER" ]; then
            echo "::error::无法检测到 webd 版本"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo ">>> 最新版本: $VER"

      - name: Download webd binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://api.github.com/repos/webd90kb/webd/contents/docs/webd/webd_dl/${VERSION}/webd-${VERSION}-x86_64-linux-musl.tar.gz"
          echo ">>> 下载: $URL"

          # GitHub API raw 端点，同域内网，无需担心 CDN 限速
          curl -fsSL -H "Accept: application/vnd.github.raw" "$URL" -o webd.tar.gz

          tar -xzf webd.tar.gz
          ls -la webd/

          cp webd/webd ./webd
          chmod +x webd
          ls -lh webd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version tag already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/webd:${VERSION}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo ">>> 镜像 ${IMAGE} 已存在，跳过构建"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo ">>> 镜像 ${IMAGE} 不存在，开始构建"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webd:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/webd:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
