name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - 'webd-binary'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 20240223）'
        default: '20240223'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo ">>> 版本: $VER"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webd:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/webd:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
