name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - 'webd-binary'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 20240223）'
        default: '20240223'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo ">>> 版本: $VER"

      - name: Verify build context
        run: |
          echo "=== workspace ==="
          ls -la
          echo "=== webd-binary ==="
          ls -lh webd-binary
          file webd-binary

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . -t webd:test 2>&1

      - name: Push to ghcr.io
        run: |
          V="${{ steps.version.outputs.version }}"
          docker tag webd:test ghcr.io/${{ github.repository_owner }}/webd:${V}
          docker tag webd:test ghcr.io/${{ github.repository_owner }}/webd:latest
          docker push ghcr.io/${{ github.repository_owner }}/webd:${V}
          docker push ghcr.io/${{ github.repository_owner }}/webd:latest
