name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号（如 20240223），留空则自动检测'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect latest webd version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(gh api repos/webd90kb/webd/contents/docs/webd/webd_dl \
              --jq '.[].name' \
              | grep -E '^[0-9]{8}$' \
              | sort -rn \
              | head -1)
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo ">>> 最新版本: $VER"

      - name: Download webd binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.version.outputs.version }}"
          echo ">>> 下载 webd ${V}"
          gh api "repos/webd90kb/webd/contents/docs/webd/webd_dl/${V}/webd-${V}-x86_64-linux-musl.tar.gz" \
            --header "Accept: application/vnd.github.raw" > webd.tar.gz
          mkdir -p _dl && tar -xzf webd.tar.gz -C _dl
          cp _dl/webd/webd ./webd-binary
          chmod +x webd-binary
          ls -lh webd-binary

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webd:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/webd:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
