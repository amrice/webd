name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号（如 20240223），留空则自动检测'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect latest webd version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(gh api repos/webd90kb/webd/contents/docs/webd/webd_dl \
              --jq '.[].name' \
              | grep -E '^[0-9]{8}$' \
              | sort -rn \
              | head -1)
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo ">>> 最新版本: $VER"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version tag already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/webd:${VERSION}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo ">>> 镜像已存在，跳过"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            WEBD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/webd:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/webd:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
