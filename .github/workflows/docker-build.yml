name: Docker Build & Push

on:
  push:
    branches: [master, main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download webd binary from official site
        run: |
          URL="https://webd.cf/webd/webd_dl/20240223/webd-20240223-x86_64-linux-musl.tar.gz"
          echo ">>> $URL"
          curl -fsSL -H "User-Agent: Mozilla/5.0" "$URL" -o /tmp/webd.tar.gz
          tar -xzf /tmp/webd.tar.gz -C /tmp
          cp /tmp/webd/webd ./webd-bin
          chmod +x webd-bin
          ls -lh webd-bin

      - name: Build image
        run: docker build . -t ghcr.io/${{ github.repository_owner }}/webd:20240223 -t ghcr.io/${{ github.repository_owner }}/webd:latest

      - name: Push image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/webd:20240223
          docker push ghcr.io/${{ github.repository_owner }}/webd:latest
