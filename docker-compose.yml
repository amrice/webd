version: "3.8"

services:
  webd:
    image: ghcr.io/amrice/webd:latest
    container_name: webd
    restart: unless-stopped
    ports:
      - "9212:9212"
    volumes:
      - ./data:/data                   # 网盘文件存储目录
      - ./webd.conf:/etc/webd.conf:ro  # 配置文件（只读挂载）

    # 如果用配置文件则无需 command；若想用命令行参数覆盖，取消注释：
    # command: ["-w", "/data", "-u", "rlumSDT:admin:admin123", "-l", "0.0.0.0:9212"]
