version: "3.8"

services:
  webd:
    # ── 方式一：从 GitHub Container Registry 拉取镜像（推荐） ──
    # 替换 <你的GitHub用户名> 为实际用户名
    # image: ghcr.io/<你的GitHub用户名>/webd:latest

    # ── 方式二：本地构建 ──
    build: .

    container_name: webd
    restart: unless-stopped
    ports:
      - "9212:9212"
    volumes:
      - ./data:/data                   # 网盘文件存储目录
      - ./webd.conf:/etc/webd.conf:ro  # 配置文件（只读挂载）

    # 如果挂载了 webd.conf，webd 会自动读取，无需额外传参
    # 若想用命令行参数覆盖配置文件，取消注释下面这行：
    # command: ["-w", "/data", "-u", "rlumSDT:admin:admin123", "-l", "0.0.0.0:9212"]
